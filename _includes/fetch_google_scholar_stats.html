<script>
  document.addEventListener('DOMContentLoaded', function () {
    var totalCitationEl = document.getElementById('total_cit');
    var citationEls = document.getElementsByClassName('show_paper_citations');

    if (!totalCitationEl && citationEls.length === 0) {
      return;
    }

    {% if site.google_scholar_stats_use_cdn %}
    var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@';
    {% else %}
    var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/';
    {% endif %}

    fetch(gsDataBaseUrl + 'google-scholar-stats/gs_data.json')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('Unable to load scholar stats.');
        }
        return response.json();
      })
      .then(function (data) {
        if (totalCitationEl && typeof data.citedby !== 'undefined') {
          totalCitationEl.textContent = data.citedby;
        }

        Array.prototype.forEach.call(citationEls, function (element) {
          var paperId = element.getAttribute('data');
          var publication = data.publications && data.publications[paperId];

          if (publication && typeof publication.num_citations !== 'undefined') {
            element.textContent = '| Citations: ' + publication.num_citations;
          }
        });
      })
      .catch(function () {
        if (totalCitationEl) {
          totalCitationEl.textContent = 'unavailable';
        }
      });
  });
</script>
