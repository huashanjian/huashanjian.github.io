{% include fetch_google_scholar_stats.html %}

<script type="module" src="{{ '/assets/js/hero-title-balance.js' | relative_url }}"></script>

<script>
  // Jottings search functionality
  (function () {
    const searchInput = document.querySelector("[data-jottings-search]");
    const jottingsList = document.querySelector("[data-jottings-list]");
    const noResults = document.querySelector("[data-jottings-no-results]");

    if (!searchInput || !jottingsList) {
      return;
    }

    const cards = Array.from(jottingsList.querySelectorAll("[data-jotting-card]"));
    const yearHeadings = Array.from(jottingsList.querySelectorAll(".archive-year-heading"));

    function filterJottings() {
      const query = searchInput.value.toLowerCase().trim();
      let visibleCount = 0;
      const visibleYears = new Set();

      cards.forEach(function (card) {
        const title = card.dataset.title || "";
        const content = card.dataset.content || "";
        const year = card.dataset.year || "";
        const matches = !query || title.includes(query) || content.includes(query);

        card.hidden = !matches;
        if (matches) {
          visibleCount++;
          visibleYears.add(year);
        }
      });

      yearHeadings.forEach(function (heading) {
        heading.hidden = !visibleYears.has(heading.dataset.year);
      });

      if (noResults) {
        noResults.hidden = visibleCount > 0;
      }
    }

    searchInput.addEventListener("input", filterJottings);
  })();
</script>

<script>
  (function () {
    const articleCopy = document.querySelector("[data-article-copy]");
    const toc = document.querySelector("[data-article-toc]");
    const tocList = document.querySelector("[data-article-toc-list]");
    const layout = document.querySelector("[data-article-layout]");
    const tocToggle = document.querySelector("[data-article-toc-toggle]");

    if (!articleCopy || !toc || !tocList || !layout) {
      return;
    }

    const tocSetting = layout.dataset.hasToc; // "true", "false", or "auto"

    // If explicitly disabled, hide TOC
    if (tocSetting === "false") {
      toc.hidden = true;
      return;
    }

    const headings = Array.from(articleCopy.querySelectorAll("h2, h3")).filter(function (heading) {
      return heading.textContent && heading.textContent.trim().length > 0;
    });

    // For "auto" mode: show TOC only if there are 3+ headings
    // For "true" mode: show TOC if there are 2+ headings
    const minHeadings = tocSetting === "auto" ? 3 : 2;

    if (headings.length < minHeadings) {
      layout.dataset.hasToc = "false";
      toc.hidden = true;
      return;
    }

    const slugCounts = {};

    function slugify(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\u4e00-\u9fff]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    headings.forEach(function (heading) {
      if (!heading.id) {
        const base = slugify(heading.textContent) || "section";
        const count = (slugCounts[base] || 0) + 1;
        slugCounts[base] = count;
        heading.id = count === 1 ? base : base + "-" + count;
      }

      const item = document.createElement("li");
      item.className = "article-toc__item article-toc__item--depth-" + (heading.tagName === "H3" ? "3" : "2");

      const link = document.createElement("a");
      link.className = "article-toc__link";
      link.href = "#" + heading.id;
      link.textContent = heading.textContent.trim();

      item.appendChild(link);
      tocList.appendChild(item);
    });

    layout.dataset.hasToc = "true";
    toc.hidden = false;

    const links = Array.from(tocList.querySelectorAll(".article-toc__link"));
    let ticking = false;
    const mobileQuery = window.matchMedia("(max-width: 900px)");

    function syncTocState() {
      if (!tocToggle) {
        return;
      }

      const open = !mobileQuery.matches || toc.classList.contains("is-open");
      tocToggle.setAttribute("aria-expanded", open ? "true" : "false");
      tocToggle.textContent = mobileQuery.matches
        ? (open ? "Close contents" : "Open contents")
        : "Contents";
    }

    function applyResponsiveTocState() {
      if (!tocToggle) {
        return;
      }

      if (mobileQuery.matches) {
        toc.classList.remove("is-open");
      } else {
        toc.classList.add("is-open");
      }

      syncTocState();
    }

    function updateActiveLink() {
      let currentId = headings[0].id;
      const offset = 180;

      headings.forEach(function (heading) {
        if (heading.getBoundingClientRect().top - offset <= 0) {
          currentId = heading.id;
        }
      });

      links.forEach(function (link) {
        link.classList.toggle("is-active", link.getAttribute("href") === "#" + currentId);
      });

      ticking = false;
    }

    function requestUpdate() {
      if (!ticking) {
        ticking = true;
        window.requestAnimationFrame(updateActiveLink);
      }
    }

    if (tocToggle) {
      tocToggle.addEventListener("click", function () {
        toc.classList.toggle("is-open");
        syncTocState();
      });
    }

    links.forEach(function (link) {
      link.addEventListener("click", function () {
        if (!mobileQuery.matches) {
          return;
        }

        toc.classList.remove("is-open");
        syncTocState();
      });
    });

    document.addEventListener("keydown", function (event) {
      if (event.key !== "Escape" || !mobileQuery.matches) {
        return;
      }

      if (toc.classList.contains("is-open")) {
        toc.classList.remove("is-open");
        syncTocState();
      }
    });

    window.addEventListener("scroll", requestUpdate, { passive: true });
    window.addEventListener("resize", function () {
      applyResponsiveTocState();
      requestUpdate();
    });
    applyResponsiveTocState();
    requestUpdate();
  })();
</script>
