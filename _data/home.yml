intro:
  label: "Intro"
  title: "Research that tries to see structure before scale"
  paragraphs:
    - "I am drawn to questions where prediction alone feels insufficient. If an agent is going to act in the physical world, I want to know what structure it has learned, what assumptions it relies on, and how those assumptions survive contact with new bodies, tools, and environments."
    - "That is why I keep returning to causality, world models, spatial intelligence, and data-efficient reinforcement learning. I care about systems that can imagine before acting, explain before overclaiming, and transfer across settings without treating every new task as a fresh start."
    - "I also care deeply about communicating science in public. Teaching, writing, and building open materials are part of the research process for me, because clarity is not decoration. It is how we test whether an idea actually holds together."

research:
  label: "Research"
  title: "Four threads I keep returning to"
  lede: "Each thread starts from a practical robotics question, then moves downward into representation, abstraction, and transfer."

research_threads:
  - title: "Causal structure for embodied agents"
    status: "Active question"
    summary: "I want agents to tell apart what merely co-occurs from what actually changes the outcome of an interaction."
    keywords: "causal representation learning, intervention-driven reasoning, physical understanding"
    signals:
      - "Why it matters: better robustness, sharper explanations, and fewer brittle shortcuts."
      - "Representative signals: Causal-PIK and recent causal world-model work aimed at physical reasoning."
  - title: "World models for decisions, not just next-step prediction"
    status: "Reading + prototyping"
    summary: "Prediction becomes useful to me when a model helps choose, evaluate, and revise actions under uncertainty."
    keywords: "decision-grounded world models, latent imagination, counterfactual planning"
    signals:
      - "Why it matters: an agent should imagine alternatives before paying the price in the real world."
      - "Representative signals: Dreamer-style imagination, JEPA-style abstraction, and evaluation work such as WorldGym."
  - title: "Spatial intelligence across bodies and scenes"
    status: "Long-term direction"
    summary: "I am interested in how geometric understanding and scene reasoning support manipulation, navigation, and transfer across embodiments."
    keywords: "3D reasoning, scene representations, spatial cognition"
    signals:
      - "Why it matters: a capable robot should reason over space, not only over pixels or language tokens."
      - "Representative signals: recent work on 4D spatial intelligence and multi-image spatial reasoning benchmarks."
  - title: "Data-efficient and safe RL for robotics"
    status: "Benchmarking focus"
    summary: "I care about policies that learn with fewer real-world trials and fail more gracefully when the world shifts."
    keywords: "model-based RL, safe exploration, sim-to-real reliability"
    signals:
      - "Why it matters: real systems are expensive, risky, and too slow for wasteful training loops."
      - "Representative directions: learned environments for control, action-constrained RL, and policy evaluation before deployment."

outputs:
  label: "Outputs"
  title: "Publications & Work in Progress"
  lede: "I do not have formal papers yet. Instead of hiding an empty list, I show the questions, prototypes, and public-facing artifacts that already shape the work."
  narrative: "Right now the site is a record of problem selection, reading, prototyping, and teaching. The publication list will come later. The intellectual trail should not have to wait."

work_in_progress:
  - title: "Causal world models for embodied interaction"
    status: "Problem framing"
    description: "Mapping what an agent should preserve when it moves from passive prediction to intervention, planning, and explanation."
  - title: "Spatial reasoning for manipulation and navigation"
    status: "Surveying + prototyping"
    description: "Studying how geometric representations, scene memory, and body-dependent constraints combine in long-horizon tasks."
  - title: "Data-efficient RL for real systems"
    status: "Implementation track"
    description: "Looking for training and evaluation setups that respect safety, sample cost, and sim-to-real mismatch from the start."

